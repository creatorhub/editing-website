<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartEdit</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0f172a;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#020617;
}

.logo{
font-size:22px;
font-weight:bold;
color:#38bdf8;
}

nav a{
margin-left:15px;
text-decoration:none;
color:white;
font-size:14px;
}

/* HERO */

.hero{
padding:60px 20px;
text-align:center;
}

.hero h1{
font-size:34px;
margin-bottom:10px;
}

.hero p{
color:#94a3b8;
}

.start-btn{
margin-top:20px;
padding:14px 30px;
border:none;
border-radius:30px;
background:#38bdf8;
color:black;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* QUICK ACTIONS */

.quick-tools{
padding:25px 15px;
}

.quick-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.quick-card{
background:#020617;
padding:18px;
border-radius:10px;
text-align:center;
border:1px solid #1e293b;
}

.quick-card a{
text-decoration:none;
color:white;
font-size:13px;
}

/* MAIN TOOLS */

.tools{
padding:20px 15px;
}

.tool-card{
background:#020617;
border-radius:12px;
padding:20px;
margin-bottom:12px;
border:1px solid #1e293b;
display:flex;
justify-content:space-between;
align-items:center;
}

.tool-card h3{
font-size:16px;
}

.open-btn{
padding:6px 14px;
background:#38bdf8;
border-radius:6px;
text-decoration:none;
color:black;
font-size:13px;
}

/* FOOTER */

footer{
text-align:center;
padding:15px;
margin-top:30px;
font-size:13px;
color:#94a3b8;
}

</style>

</head>

<body>

<header>

<div class="logo">SmartEdit</div>

<nav>

<a href="#">Home</a>
<a href="photo-editor.html">Photo</a>
<a href="video-editor.html">Video</a>

</nav>

</header>

<section class="hero">

<h1>Create Amazing Edits</h1>

<p>Edit photos and videos directly in your browser.</p>

<button class="start-btn" onclick="openEditor()">Start Editing</button>

</section>


<section class="quick-tools">

<div class="quick-grid">

<div class="quick-card">
<a href="photo-editor.html">Photo</a>
</div>

<div class="quick-card">
<a href="video-editor.html">Video</a>
</div>

<div class="quick-card">
<a href="bg-remove.html">Remove BG</a>
</div>

<div class="quick-card">
<a href="ai-reel.html">AI Reel</a>
</div>

</div>

</section>


<section class="tools">

<div class="tool-card">

<h3>Photo Editor</h3>

<a class="open-btn" href="photo-editor.html">Open</a>

</div>

<div class="tool-card">

<h3>Video Editor</h3>

<a class="open-btn" href="video-editor.html">Open</a>

</div>

<div class="tool-card">

<h3>Background Remover</h3>

<a class="open-btn" href="bg-remove.html">Open</a>

</div>

<div class="tool-card">

<h3>AI Reel Maker</h3>

<a class="open-btn" href="ai-reel.html">Open</a>

</div>

</section>


<footer>

<p>© SmartEdit</p>

</footer>


<script>

function openEditor(){

window.location.href="photo-editor.html"

}

</script>

</body>

</html>
