<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartEdit</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f172a;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#020617;
}

.logo{
font-size:22px;
font-weight:bold;
color:#38bdf8;
}

/* HERO */

.hero{
padding:60px 20px;
text-align:center;
}

.hero h1{
font-size:34px;
margin-bottom:10px;
}

.hero p{
color:#94a3b8;
}

.start-btn{
margin-top:25px;
padding:15px 35px;
border:none;
border-radius:30px;
font-size:17px;
font-weight:bold;
background:#38bdf8;
color:black;
cursor:pointer;
}

/* HISTORY */

.history{
padding:25px 15px;
}

.history h2{
margin-bottom:15px;
font-size:18px;
}

.history-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.project-card{
background:#020617;
border-radius:10px;
padding:20px;
text-align:center;
border:1px solid #1e293b;
}

.project-thumb{
height:70px;
background:#1e293b;
border-radius:6px;
margin-bottom:10px;
}

.project-name{
font-size:13px;
color:#cbd5f5;
}

/* FOOTER */

footer{
text-align:center;
padding:15px;
color:#94a3b8;
font-size:13px;
}

</style>

</head>

<body>

<header>

<div class="logo">SmartEdit</div>

</header>


<section class="hero">

<h1>Create Amazing Edits</h1>

<p>Edit photos and videos instantly.</p>

<button class="start-btn" onclick="openEditor()">
Start Editing
</button>

</section>


<section class="history">

<h2>Recent Projects</h2>

<div class="history-grid">

<div class="project-card">
<div class="project-thumb"></div>
<div class="project-name">Project 1</div>
</div>

<div class="project-card">
<div class="project-thumb"></div>
<div class="project-name">Project 2</div>
</div>

<div class="project-card">
<div class="project-thumb"></div>
<div class="project-name">Project 3</div>
</div>

<div class="project-card">
<div class="project-thumb"></div>
<div class="project-name">Project 4</div>
</div>

</div>

</section>


<footer>

<p>© SmartEdit</p>

</footer>


<script>

function openEditor(){

window.location.href="editor.html"

}

</script>

</body>

</html>
